name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on feature branches / PRs, but never on main —
  # each commit to main needs its own independent green/red signal because
  # Deploy gates on it.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  build:
    # Builds the container image to catch Dockerfile / requirements breakage
    # on PR rather than at deploy time. We don't push — the deploy workflow
    # rebuilds (cache-hot) and pushes on its own after CI is green on main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sketch:ci
          # GitHub Actions cache backend: layers persist across runs in the
          # repo's Actions cache (10 GB / 7-day TTL). First PR build is cold
          # (~1-2 min); subsequent builds reuse layers and finish in seconds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
